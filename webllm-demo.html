<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Qwen Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.6;
    }

    #chat {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      min-height: 240px;
      white-space: pre-wrap;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
    }

    .status {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Qwen 瀏覽器最小範例</h1>
  <div class="status" id="status">模型尚未載入</div>
  <div id="chat"></div>

  <div class="row">
    <input id="prompt" type="text" placeholder="輸入訊息..." />
    <button id="send">送出</button>
  </div>

  <script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    const statusEl = document.getElementById("status");
    const chatEl = document.getElementById("chat");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("send");

    let engine = null;

    function addMessage(role, text) {
      chatEl.textContent += `${role}: ${text}\n\n`;
      chatEl.scrollTop = chatEl.scrollHeight;
    }

async function initModel() {
  statusEl.textContent = "模型載入中... 第一次會下載模型，可能要幾分鐘";

  engine = await CreateMLCEngine(

    // =========================
    // 可切換測試的模型
    // =========================

    // Qwen 系列
    "Qwen2.5-7B-Instruct-q4f16_1-MLC",   // ⭐目前使用 (品質高，但載入很大)

    // "Qwen2.5-3B-Instruct-q4f16_1-MLC", // 中型模型
    // "Qwen2.5-1.5B-Instruct-q4f16_1-MLC", // 小型模型
    // "Qwen2.5-0.5B-Instruct-q4f16_1-MLC", // 超小模型 (最適合瀏覽器)

    // 舊版 Qwen2
    // "Qwen2-1.5B-Instruct-q4f16_1-MLC",

    // Google Gemma
    // "gemma-2b-it-q4f16_1-MLC",
    // "gemma-7b-it-q4f16_1-MLC",

    // Microsoft Phi
    // "Phi-3-mini-4k-instruct-q4f16_1-MLC",
    // "Phi-3.5-mini-instruct-q4f16_1-MLC",

    // Llama 系列
    // "Llama-3-8B-Instruct-q4f16_1-MLC",

    {
      initProgressCallback: (report) => {
        statusEl.textContent = `模型載入中：${report.text || ""}`;
      }
    }
  );

  statusEl.textContent = "模型已就緒";
}

    async function sendMessage() {
      const text = promptEl.value.trim();
      if (!text || !engine) return;

      promptEl.value = "";
      addMessage("你", text);
      addMessage("AI", "思考中...");

      try {
        const messages = [
          { role: "system", content: "你是一個簡潔的中文助理。" },
          { role: "user", content: text }
        ];

        const reply = await engine.chat.completions.create({
          messages,
          temperature: 0.7,
          max_tokens: 256
        });

        const answer = reply.choices[0]?.message?.content || "(沒有回覆)";
        chatEl.textContent = chatEl.textContent.replace(/AI: 思考中\.\.\.\n\n$/, "");
        addMessage("AI", answer);
      } catch (err) {
        chatEl.textContent = chatEl.textContent.replace(/AI: 思考中\.\.\.\n\n$/, "");
        addMessage("系統", "發生錯誤：" + err.message);
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    initModel();
  </script>
</body>
</html>
